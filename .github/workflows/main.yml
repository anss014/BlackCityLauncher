name: Build Black City APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip everything
        run: |
          unzip -o "*.zip"
          # Барлық ішкі папкаларды тексеріп, android папкасы бар жерді табу
          ROOT_DIR=$(find . -maxdepth 3 -name "android" -type d -printf '%h\n' | head -n 1)
          echo "PROJECT_ROOT=$ROOT_DIR" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          cd ${{ env.PROJECT_ROOT }}
          yarn install

      - name: Build Android
        run: |
          cd ${{ env.PROJECT_ROOT }}/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BlackCity-Launcher
          path: "**/build/outputs/apk/debug/app-debug.apk"
