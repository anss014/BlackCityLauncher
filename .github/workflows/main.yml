name: Build Black City APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Unzip project
        run: unzip SAMP-Mobile-Launcher-RN-main.zip.zip

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          cd SAMP-Mobile-Launcher-RN-main
          yarn install

      - name: Build Android Debug
        run: |
          cd SAMP-Mobile-Launcher-RN-main/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: BlackCity-Launcher
          path: SAMP-Mobile-Launcher-RN-main/android/app/build/outputs/apk/debug/app-debug.apk
